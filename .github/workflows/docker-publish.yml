name: Build and Push to Docker Hub

on:
  push:
    branches:
      - "main"  # Se ejecuta cuando haces push a la rama main
    tags:
      - "v*.*.*" # También se ejecuta cuando creas un tag de versión (ej. v1.0.0)

jobs:
  docker:
    runs-on: ubuntu-latest

    env:  
      AWS_REGION: us-east-2         
      ECR_REPOSITORY: arka/backend        


    steps:
    # --- 'brings' repo folder to works w it
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reemplazar application.yml con configuración de producción  
        run: |   
          printf '%s' "${{ secrets.APPLICATION_YML }}" > ./Backend/src/bootstrap/src/main/resources/application.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      # ----- Login DockerHub --------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---- Login AWS ECR (Tradicional) ----  
      - name: Configure AWS credentials  
        uses: aws-actions/configure-aws-credentials@v4  
        with:  
          aws-access-key-id: ${{ secrets.ECR_PUSH_AWS_ACCESS_KEY_ID }}  
          aws-secret-access-key: ${{ secrets.ECR_PUSH_AWS_SECRET_ACCESS_KEY }}  
          aws-region: ${{ env.AWS_REGION }}  
  
      - name: Login to Amazon ECR  
        id: login-ecr  
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Backend/Dockerfile.deploy
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arka:latest
            ${{ secrets.DOCKER_USERNAME }}/arka:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest  
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

