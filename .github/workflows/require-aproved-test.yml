name: Mandatory Tests in PRs

on:
  pull_request:
    branches:
      - dev
      - main

jobs:  
  tests:  
    name: tests  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
  
      - uses: actions/setup-java@v4  
        with:  
          distribution: temurin  
          java-version: "21"  
  
      - name: Run tests (Gradle)  
        working-directory: Backend/src  
        run: |  
          chmod +x gradlew  
          ./gradlew test
